global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'ecommerce-app'
    metrics_path: '/actuator/prometheus'
    eureka_sd_configs:
      - server: 'http://discovery-service:8761/eureka'
    relabel_configs:
      - source_labels: [__meta_eureka_app_name]
        target_label: application
      - source_labels: [__meta_eureka_instance_port]
        target_label: instance_port