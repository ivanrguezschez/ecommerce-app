spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/v1/customers/**
              filters:
                - PreserveHostHeader
                - RewritePath=/api/v1/customers/v3/api-docs, /v3/api-docs
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**
              filters:
                - PreserveHostHeader
                - RewritePath=/api/v1/products/v3/api-docs, /v3/api-docs
            - id: cart-service
              uri: lb://cart-service
              predicates:
                - Path=/api/v1/cart/**
              filters:
                - PreserveHostHeader
                - RewritePath=/api/v1/cart/v3/api-docs, /v3/api-docs
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
server:
  port: 8222
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.ipc.netty: DEBUG
    reactor.netty: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
management:
  endpoints:
    web:
      exposure:
        # include: health, info, beans, metrics, env
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
springdoc:
  swagger-ui:
    urls:
      - name: Customer Microservice
        url: /api/v1/customers/v3/api-docs
      - name: Product Microservice
        url: /api/v1/products/v3/api-docs
      - name: Cart Microservice
        url: /api/v1/cart/v3/api-docs